<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Azad Ply</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, rgba(227,166,85,0.1) 0%, var(--bg-dark) 70%);
        }
        .reset-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-align: center;
        }
        .reset-container h2 {
            margin-bottom: 2rem;
            color: #fff;
        }
        .reset-container h2 span {
            color: var(--primary);
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }
        .input-icon-wrapper {
            position: relative;
        }
        .input-icon-wrapper span {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }
        .input-icon-wrapper input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.5rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: var(--radius-sm);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }
        .input-icon-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(227,166,85,0.2);
        }
    </style>
</head>
<body>

    <div class="reset-container">
        <h2>Reset <span>Password</span></h2>
        <form id="resetForm">
            <div class="form-group">
                <label>New Password *</label>
                <div class="input-icon-wrapper">
                    <span>🔒</span>
                    <input type="password" id="newPassword" placeholder="Minimum 6 characters" required>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm New Password *</label>
                <div class="input-icon-wrapper">
                    <span>🔒</span>
                    <input type="password" id="confirmPassword" placeholder="Re-enter new password" required>
                </div>
            </div>
            <button type="submit" class="btn" style="width: 100%; padding: 1rem;">Update Password &rarr;</button>
        </form>
        <div style="margin-top: 1.5rem;">
            <a href="/" class="gold-text">&larr; Return to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = e.target.querySelector('button');

            if (newPassword !== confirmPassword) {
                return alert("Passwords do not match!");
            }

            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                return alert("Invalid or missing password reset token in URL.");
            }

            btn.textContent = 'Updating...';
            btn.style.pointerEvents = 'none';

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert(data.message);
                    window.location.href = '/';
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert("An error occurred while communicating with the server.");
            } finally {
                btn.textContent = 'Update Password →';
                btn.style.pointerEvents = 'auto';
            }
        });
    </script>
</body>
</html>
